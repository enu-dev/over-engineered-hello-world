<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HELLO WORLD — 過剰に凝ったやつ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ローディング画面 -->
  <div id="loader">
    <div class="loader-terminal">
      <div class="loader-header">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="loader-title">system_init.sh</span>
      </div>
      <div id="boot-log" class="boot-log"></div>
      <div class="progress-bar-wrap">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
    </div>
  </div>

  <!-- メインアプリ -->
  <div id="app" class="hidden">

    <!-- パーティクルキャンバス -->
    <canvas id="canvas"></canvas>

    <!-- カスタムカーソル -->
    <div id="cursor-glow"></div>
    <div id="cursor-dot"></div>

    <!-- メインコンテンツ -->
    <main class="main-container">
      <p class="subtitle">過剰に凝った</p>
      <h1 id="hello-text" class="hello-world" aria-label="HELLO WORLD"></h1>
      <div class="meta-info">
        <span class="meta-item">HTML / CSS / JS only</span>
        <span class="meta-sep">·</span>
        <span class="meta-item">no frameworks</span>
        <span class="meta-sep">·</span>
        <span class="meta-item">no build tools</span>
      </div>
      <p class="hint" id="hint">クリックしてみて</p>
    </main>

    <!-- コーナーHUD -->
    <div class="hud hud-tl">
      <span class="hud-label">SYS</span>
      <span class="hud-value" id="fps-counter">-- fps</span>
    </div>
    <div class="hud hud-tr">
      <span class="hud-label">CLICKS</span>
      <span class="hud-value" id="click-counter">0</span>
    </div>
    <div class="hud hud-bl">
      <span class="hud-value">v1.0.0-overengineered</span>
    </div>
    <div class="hud hud-br">
      <span class="hud-label">PARTICLES</span>
      <span class="hud-value">80</span>
    </div>

    <!-- イースターエッグ：多言語フラッシュ -->
    <div id="easter-egg" class="easter-egg hidden">
      <div id="lang-flash" class="lang-flash"></div>
    </div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
